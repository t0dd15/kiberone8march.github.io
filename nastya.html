<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nastya: Coding Tutor Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0208;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 95%;
            max-width: 850px;
            border: 2px solid #00ff41;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            background: rgba(0, 0, 0, 0.95);
        }

        /* Фикс бага: используем pre-wrap и фиксированный шрифт */
        #ascii-art {
            white-space: pre;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #00ff41;
            display: block;
            text-align: center;
            min-height: 160px;
        }

        #story-text {
            height: 100px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.4;
            border-top: 1px solid #003b00;
            padding-top: 15px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: #001a00;
            border: 1px solid #00ff41;
            font-weight: bold;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: #003b00;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff41;
            color: #000;
        }

        .inventory {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #008f11;
            border-top: 1px dashed #003b00;
            padding-top: 10px;
        }

        .back-link {
            margin-top: 20px;
            color: #333;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back-link:hover { color: #00ff41; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats-bar">
            <span>🔋 ЭНЕРГИЯ: <span id="hp">100</span>%</span>
            <span>👾 УЧЕНИК: <span id="child-count">0</span>/15</span>
            <span>⭐ XP: <span id="xp">0</span></span>
        </div>

        <pre id="ascii-art"></pre>

        <div id="story-text"></div>

        <div class="btn-group" id="actions"></div>

        <div class="inventory">
            АРТЕФАКТЫ: <span id="inv-items">Пусто</span>
        </div>
    </div>

    <a href="index.html" class="back-link">[ ВЕРНУТЬСЯ В ХАБ ]</a>

    <script>
        // Использованы двойные слэши \\ для корректного отображения в JS
        const arts = {
            coding: 
`    _______________________
   |  Python 3.10  [ _ ] [X]|
   |-----------------------|
   | print("Hello World")  |
   | ^ SyntaxError: EOL    |
   |_______________________|`,
            
            panic: 
`      (>_<)  !! ERROR !!
     /(   )\\
      /   \\
    "ВСЁ СЛОМАЛОСЬ!"`,
            
            success: 
`      (^_^)  [ BUILD SUCCESS ]
     <|   |>
      /   \\
    "ОНО РАБОТАЕТ!"`
        };

        const children = [
            { name: "Артем", issue: "забыл закрыть кавычку в строке print('Hello).", type: "syntax" },
            { name: "Лера", issue: "написала бесконечный цикл, и её компьютер начал взлетать.", type: "logic" },
            { name: "Иван", issue: "не понимает, почему 2+2 у него равно 22.", type: "logic" },
            { name: "Соня", issue: "случайно удалила весь проект перед сохранением.", type: "panic" },
            { name: "Макс", issue: "пытается импортировать библиотеку 'minecraft' в Python.", type: "syntax" },
            { name: "Даня", issue: "заблудился в трех отступах if-else.", type: "logic" },
            { name: "Аня", issue: "плачет, потому что код не работает, а ошибок не выдает.", type: "panic" },
            { name: "Кирилл", issue: "назвал переменную 'переменная' на русском.", type: "syntax" },
            { name: "Маша", issue: "создала переменную для каждого пикселя на экране.", type: "logic" },
            { name: "Егор", issue: "пытается запустить код через Paint.", type: "logic" },
            { name: "Диана", issue: "забыла, как пишется слово 'function'.", type: "syntax" },
            { name: "Никита", issue: "уверен, что компьютер сломался лично против него.", type: "panic" },
            { name: "Оля", issue: "написала 100 строк кода без единой проверки.", type: "logic" },
            { name: "Тимофей", issue: "хочет сделать игру как GTA за 40 минут урока.", type: "panic" },
            { name: "Юля", issue: "поняла тему быстрее всех и теперь скучает.", type: "bonus" }
        ];

        let state = {
            hp: 100,
            xp: 0,
            childIndex: 0,
            inv: []
        };

        function update() {
            const container = document.getElementById('actions');
            const artElement = document.getElementById('ascii-art');
            const story = document.getElementById('story-text');
            
            container.innerHTML = '';

            if (state.childIndex >= children.length) {
                artElement.innerText = arts.success;
                story.innerText = `ПОБЕДА! Настя, ты — мастер кода! 15/15 учеников догнали программу. Твой итоговый опыт: ${state.xp}.`;
                container.innerHTML = '<button onclick="location.reload()">Начать новый урок</button>';
                return;
            }

            const child = children[state.childIndex];
            document.getElementById('hp').innerText = state.hp;
            document.getElementById('xp').innerText = state.xp;
            document.getElementById('child-count').innerText = state.childIndex + 1;
            document.getElementById('inv-items').innerText = state.inv.join(", ") || "Пусто";

            artElement.innerText = (child.type === "panic") ? arts.panic : arts.coding;
            story.innerText = `Ученик ${state.childIndex + 1}/15 (${child.name}): ${child.issue}`;

            const actions = [
                { text: "Поправить синтаксис", effect: () => { state.xp += 10; state.hp -= 5; } },
                { text: "Объяснить логику", effect: () => { state.xp += 15; state.hp -= 8; } },
                { text: "Успокоить ученика", effect: () => { state.xp += 5; state.hp -= 3; } },
                { text: "Дать задание сложнее", effect: () => { state.xp += 20; state.hp -= 12; }, condition: () => child.type === "bonus" }
            ];

            actions.forEach(act => {
                if (act.condition && !act.condition()) return;
                const btn = document.createElement('button');
                btn.innerText = act.text;
                btn.onclick = () => {
                    act.effect();
                    state.childIndex++;
                    if (state.hp > 100) state.hp = 100;
                    if (state.hp <= 0) {
                        story.innerText = "Энергия закончилась... Пора выпить кофе и восстановиться!";
                        container.innerHTML = '<button onclick="location.reload()">Перезагрузка</button>';
                    } else {
                        update();
                    }
                };
                actionContainer = container.appendChild(btn);
            });
        }

        update();
    </script>
</body>
</html>
