<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Masha L. | Business Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            color: #2c3e50;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .dashboard {
            width: 100%; max-width: 900px;
            background: white; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
        }
        header { border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 10px; }
        h1 { margin: 0; color: #2c3e50; font-size: 1.8rem; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa; border: 1px solid #eee; padding: 20px; border-radius: 10px; text-align: center;
        }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; color: #3498db; }
        
        .task-list { list-style: none; padding: 0; }
        .task-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 8px;
            transition: 0.3s;
        }
        .task-item:hover { background: #fdfdfd; transform: translateX(5px); }
        .task-info { display: flex; align-items: center; gap: 15px; }
        .checkbox {
            width: 24px; height: 24px; border: 2px solid #3498db; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .completed { background: #2ecc71; border-color: #2ecc71; color: white; text-decoration: line-through; opacity: 0.6; }
        
        .btn-complete {
            background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 6px;
            cursor: pointer; font-weight: 600;
        }
        .btn-complete:disabled { background: #bdc3c7; cursor: not-allowed; }

        .bonus-section {
            margin-top: 30px; padding: 20px; background: #e8f4fd; border-radius: 10px;
            text-align: center; display: none;
        }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #95a5a6; text-decoration: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>Q1 Spring Report: Masha L. 📈</h1>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Уровень Счастья</h3>
            <p id="happiness">10%</p>
        </div>
        <div class="stat-card">
            <h3>Задачи закрыты</h3>
            <p id="tasks-done">0 / 6</p>
        </div>
        <div class="stat-card">
            <h3>Статус</h3>
            <p id="status">Working</p>
        </div>
    </div>

    <h3>To-Do List: Праздничный план</h3>
    <ul class="task-list" id="task-list">
        </ul>

    <div id="bonus" class="bonus-section">
        <h2>🎉 План выполнен на 100%!</h2>
        <p>Квартальная премия: Безлимитное весеннее настроение и 1000 комплиментов!</p>
        <button class="btn-complete" onclick="window.location.href='index.html'">Получить выходной</button>
    </div>

    <a href="index.html" class="back-link">← Вернуться в корпоративный хаб</a>
</div>

<script>
    const tasks = [
        { id: 1, text: "Сказать Никите какой он хороший", value: 15 },
        { id: 2, text: "Проигнорировать звонки от родителей", value: 20 },
        { id: 3, text: "Послушать с утра BTS пока никто не видит", value: 15 },
        { id: 4, text: "Забронировать столик в чили", value: 20 },
        { id: 5, text: "Получить 500 комплиментов", value: 15 },
        { id: 6, text: "Забыть слово резиденты до завтра", value: 15 }
    ];

    let completedCount = 0;
    let totalHappiness = 10;

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = 'task-item';
            li.id = `task-${task.id}`;
            li.innerHTML = `
                <div class="task-info">
                    <div class="checkbox" id="check-${task.id}" onclick="completeTask(${task.id}, ${task.value})"></div>
                    <span>${task.text}</span>
                </div>
                <span style="font-size: 0.8rem; color: #7f8c8d;">KPI: +${task.value}%</span>
            `;
            list.appendChild(li);
        });
    }

    function completeTask(id, value) {
        const check = document.getElementById(`check-${id}`);
        const item = document.getElementById(`task-${id}`);
        
        if (!check.classList.contains('completed')) {
            check.classList.add('completed');
            check.innerHTML = '✔';
            item.style.opacity = '0.5';
            
            completedCount++;
            totalHappiness += value;
            if (totalHappiness > 100) totalHappiness = 100;

            updateStats();
        }
    }

    function updateStats() {
        document.getElementById('happiness').innerText = totalHappiness + '%';
        document.getElementById('tasks-done').innerText = `${completedCount} / ${tasks.length}`;
        
        if (completedCount === tasks.length) {
            document.getElementById('status').innerText = 'OUT OF OFFICE';
            document.getElementById('status').style.color = '#2ecc71';
            document.getElementById('bonus').style.display = 'block';
        }
    }

    renderTasks();
</script>

</body>
</html>
