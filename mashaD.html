<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Masha D. | Zen Call Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #eef2f3;
            color: #333;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .phone-container {
            width: 320px;
            height: 600px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 8px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 20px; }
        
        .caller-id { margin-top: 50px; }
        .avatar {
            width: 100px; height: 100px;
            background: #ddd; border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        .caller-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .call-status { color: #f44336; font-weight: bold; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        .chat-bubble {
            background: #f1f0f0;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            display: none;
        }

        .actions { margin-top: auto; padding-bottom: 30px; }
        .btn-call {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .accept { background: #4caf50; color: white; }
        .decline { background: #f44336; color: white; }
        
        .zen-bar {
            height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden;
        }
        #zen-fill { height: 100%; background: #2196f3; width: 100%; transition: 0.5s; }

        .back-link { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); color: #777; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <div class="status-bar">
            <span>12:00</span>
            <span>🔋 8%</span>
        </div>

        <div id="call-ui">
            <div class="caller-id">
                <div class="avatar">👨‍💼</div>
                <div class="caller-name" id="caller-name">Папа Артема</div>
                <div class="call-status">ВХОДЯЩИЙ ВЫЗОВ...</div>
            </div>
            
            <div class="chat-bubble" id="phrase"></div>

            <div class="zen-bar"><div id="zen-fill"></div></div>
            <p style="font-size: 10px;">УРОВЕНЬ ДЗЕНА</p>

            <div class="actions" id="buttons">
                <button class="btn-call accept" onclick="answer()">ОТВЕТИТЬ</button>
                <button class="btn-call decline" onclick="ignore()">СБРОСИТЬ</button>
            </div>
        </div>
    </div>
    <a href="index.html" class="back-link">Убрать телефон в сумку</a>
</div>

<script>
    const callers = [
        { name: "Мама Ивана", phrase: "Почему моему сыну сняли кибероны, если он гений?!", options: ["Объяснить что его сын дурак", "Смягчить ответ"], cost: 10 },
        { name: "Папа Светы", phrase: "А вы сможете научите её кодить на Python за неделю?", options: ["Спустить на землю", "Пообещать чудо"], cost: 20 },
        { name: "Бабушка Коли", phrase: "Он не придет, у него лапки... то есть насморк!", options: ["Пожелать здоровья", "Спросить про оплату"], cost: 5 },
        { name: "Мама Алисы", phrase: "А почему вы не ответили мне в 3:22 в воскресенье?!", options: ["Напомнить про границы", "Извиниться"], cost: 30 }
    ];

    let currentIdx = 0;
    let zen = 100;

    function answer() {
        const caller = callers[currentIdx];
        document.querySelector('.call-status').innerText = "В РАЗГОВОРЕ";
        document.querySelector('.call-status').style.color = "#4caf50";
        document.getElementById('phrase').style.display = "block";
        document.getElementById('phrase').innerText = caller.phrase;

        const btnContainer = document.getElementById('buttons');
        btnContainer.innerHTML = '';
        
        caller.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-call accept';
            btn.style.fontSize = '12px';
            btn.innerText = opt;
            btn.onclick = () => nextCall(caller.cost + (i * 10));
            btnContainer.appendChild(btn);
        });
    }

    function ignore() {
        zen -= 5;
        nextCall(0);
    }

    function nextCall(cost) {
        zen -= cost;
        if (zen < 0) zen = 0;
        document.getElementById('zen-fill').style.width = zen + '%';
        
        currentIdx++;
        if (currentIdx < callers.length && zen > 0) {
            resetUI();
        } else {
            finish();
        }
    }

    function resetUI() {
        const caller = callers[currentIdx];
        document.getElementById('caller-name').innerText = caller.name;
        document.querySelector('.call-status').innerText = "ВХОДЯЩИЙ ВЫЗОВ...";
        document.querySelector('.call-status').style.color = "#f44336";
        document.getElementById('phrase').style.display = "none";
        document.getElementById('buttons').innerHTML = `
            <button class="btn-call accept" onclick="answer()">ОТВЕТИТЬ</button>
            <button class="btn-call decline" onclick="ignore()">СБРОСИТЬ</button>
        `;
    }

    function finish() {
        const ui = document.getElementById('call-ui');
        let msg = zen > 20 ? "Маша, ты — гуру переговоров! 🧘‍♀️" : "Срочно нужен отпуск и тишина! 🔇";
        ui.innerHTML = `
            <div style="margin-top:100px;">
                <h2>СМЕНА ОКОНЧЕНА</h2>
                <p>${msg}</p>
                <p>Твой остаток Дзена: ${zen}%</p>
                <button class="btn-call accept" onclick="location.reload()">Начать новый день</button>
            </div>
        `;
    }
</script>

</body>
</html>
