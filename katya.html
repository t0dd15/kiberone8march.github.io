<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Katya | Queen of the Ring 🥊</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: 'Roboto Condensed', sans-serif;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }
        .gym-container {
            padding: 40px 20px;
            max-width: 600px;
            margin: auto;
        }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            color: #ff3e3e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: #252525;
            padding: 15px;
            border-bottom: 4px solid #ff3e3e;
            margin-bottom: 30px;
        }
        .stat-item span { display: block; color: #aaa; font-size: 0.8rem; }
        .stat-item strong { font-size: 1.5rem; color: #fff; }

        /* Боксерская груша */
        #boxing-bag {
            width: 150px;
            height: 250px;
            background: #8b0000;
            margin: 40px auto;
            border-radius: 20px 20px 60px 60px;
            border: 5px solid #4a0000;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #boxing-bag::before {
            content: '';
            position: absolute;
            top: -30px; left: 50%;
            width: 4px; height: 35px;
            background: #555; transform: translateX(-50%);
        }
        #boxing-bag:active {
            transform: scale(0.95) rotate(5deg);
        }

        .punch-text {
            position: absolute;
            color: #ff3e3e;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .progress-container {
            width: 100%;
            height: 25px;
            background: #333;
            border-radius: 12px;
            margin: 20px 0;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff8e8e);
            transition: width 0.3s;
        }

        button#special-move {
            background: #ff3e3e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            display: none;
            margin: 20px auto;
        }
        button#special-move:hover { background: #cc0000; }

        .back-link { color: #555; text-decoration: none; margin-top: 40px; display: block; }
    </style>
</head>
<body>

<div class="gym-container">
    <h1>KATYA'S CAMP 🥊</h1>
    <p>Бей по груше, чтобы выбить все плохие мысли!</p>

    <div class="stats-row">
        <div class="stat-item"><span>УДАРОВ</span><strong id="hits">0</strong></div>
        <div class="stat-item"><span>СИЛА</span><strong id="power">100%</strong></div>
    </div>

    <div id="boxing-bag" onclick="punch(event)"></div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <p id="label">ПРОГРЕСС ТРЕНИРОВКИ: <span id="percent">0%</span></p>

    <button id="special-move" onclick="victory()">ФИНАЛЬНЫЙ АППЕРКОТ!</button>

    <a href="index.html" class="back-link">← Вернуться на базу</a>
</div>

<script>
    let hits = 0;
    let progress = 0;
    const targets = ["БАГИ", "ДЕЛА", "РУТИНА", "СТРЕСС", "ОШИБКИ"];

    function punch(event) {
        hits++;
        progress += 2; // Нужно 50 ударов для победы
        
        // Обновляем текст
        document.getElementById('hits').innerText = hits;
        
        // Обновляем прогресс-бар
        if (progress > 100) progress = 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        document.getElementById('percent').innerText = progress + '%';

        // Создаем вылетающий текст
        const text = document.createElement('div');
        text.className = 'punch-text';
        text.innerText = targets[Math.floor(Math.random() * targets.length)] + "!";
        text.style.left = event.clientX + 'px';
        text.style.top = (event.clientY - 50) + 'px';
        document.body.appendChild(text);

        // Удаляем текст через полсекунды
        setTimeout(() => text.remove(), 600);

        // Если дошли до конца
        if (progress >= 100) {
            document.getElementById('boxing-bag').style.display = 'none';
            document.getElementById('special-move').style.display = 'block';
            document.getElementById('label').innerText = "КАТЯ ГОТОВА К ВЫХОДУ НА РИНГ!";
        }
    }

    function victory() {
        document.body.innerHTML = `
            <div style="padding-top: 100px; background: #1a1a1a; height: 100vh;">
                <h1 style="font-size: 5rem; color: gold;">K.O.!</h1>
                <h2 style="color: white;">Катя — абсолютный чемпион 8 Марта!</h2>
                <p style="font-size: 1.5rem; color: #ff3e3e;">🏆 Пояс чемпиона за невероятную силу и красоту твой! 🏆</p>
                <br>
                <button onclick="location.reload()" style="padding: 10px 20px;">Начать тренировку заново</button>
                <br><br>
                <a href="index.html" style="color: #555; text-decoration: none;">← Вернуться в хаб</a>
            </div>
        `;
    }
</script>

</body>
</html>
